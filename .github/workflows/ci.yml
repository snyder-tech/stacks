name: ci

on:
  pull_request: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.sha }}
  cancel-in-progress: true

jobs:
  prettier-linux:
    name: Linux / Prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prettier
        uses: dagger/dagger-for-github@v8.4.0
        with:
          version: "0.20.3"
          verb: call
          args: prettier --source=.
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

  lint-linux:
    name: Linux / Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint
        uses: dagger/dagger-for-github@v8.4.0
        with:
          version: "0.20.3"
          verb: call
          args: lint --source=.
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

  build-test-linux:
    name: Linux / Build + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build + Test
        uses: dagger/dagger-for-github@v8.4.0
        with:
          version: "0.20.3"
          verb: call
          args: build-and-test --source=.
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

  build-native-macos:
    name: Native / macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - name: Install Corepack
        run: npm install --global --force corepack@latest
      - name: Enable Corepack
        run: |
          corepack enable
          pnpm --version
      - name: Setup Node.js cache
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: "pnpm"
          cache-dependency-path: "**/pnpm-lock.yaml"
      - name: Install
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Check
        run: pnpm run check

  ci-summary:
    name: CI Summary
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs:
      - prettier-linux
      - lint-linux
      - build-test-linux
      - build-native-macos
    steps:
      - name: Check required job results
        env:
          PRETTIER_RESULT: ${{ needs.prettier-linux.result }}
          LINT_RESULT: ${{ needs.lint-linux.result }}
          BUILD_TEST_RESULT: ${{ needs.build-test-linux.result }}
          BUILD_NATIVE_MACOS_RESULT: ${{ needs.build-native-macos.result }}
        run: |
          test "$PRETTIER_RESULT" = "success"
          test "$LINT_RESULT" = "success"
          test "$BUILD_TEST_RESULT" = "success"
          test "$BUILD_NATIVE_MACOS_RESULT" = "success"
